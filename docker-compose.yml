services:
  miraprompt-server:
    build:
      context: ./miraprompt-server
      dockerfile: Dockerfile
    container_name: miraprompt-server
    user: "${MIRAPROMPT_SERVER_UID:-1000}:${MIRAPROMPT_SERVER_GID:-1000}"
    env_file:
      - .env
    environment:
      PORT: 3001
      NODE_ENV: development
      MIRAPROMPT_DATA_DIR: /app/data
    ports:
      - "${MIRAPROMPT_SERVER_PORT:-3011}:3001"
    volumes:
      - ${MIRAPROMPT_DATA_DIR:-./data}:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  obsidian-watcher:
    build:
      context: ./obsidian-watcher
      dockerfile: Dockerfile
    container_name: obsidian-watcher
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MIRAPROMPT_SERVER_URL: http://miraprompt-server:3001
      MIRAPROMPT_DATA_DIR: /miraprompt-data
      OBSIDIAN_VAULT_PATHS: /vault1,/vault2
      OBSIDIAN_ATTACHMENTS_DIR: ${OBSIDIAN_ATTACHMENTS_DIR:-_generated}
      DEFAULT_MODEL_ID: ${DEFAULT_MODEL_ID:-flux/schnell}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
    volumes:
      - ${OBSIDIAN_VAULT_PATH_1}:/vault1
      - ${OBSIDIAN_VAULT_PATH_2}:/vault2
      - ${MIRAPROMPT_DATA_DIR:-./data}:/miraprompt-data:ro
    depends_on:
      miraprompt-server:
        condition: service_healthy

  miraprompt-ui:
    build:
      context: ./miraprompt-ui
      dockerfile: Dockerfile
    container_name: miraprompt-ui
    environment:
      VITE_API_URL: http://miraprompt-server:3001
    ports:
      - "${MIRAPROMPT_UI_PORT:-9020}:80"
    depends_on:
      - miraprompt-server
